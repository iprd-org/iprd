name: Generate Metadata Catalog

on:
  schedule:
    - cron: '0 0 * * 3'  # Run weekly on Wednesday
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pycountry

      - name: Generate metadata catalog
        run: python scripts/generate_site_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Check if there are changes in the correct paths
          if [[ -n $(git status --porcelain docs/site_data/) ]]; then
            git add docs/site_data/
            git commit -m "Update metadata catalog [automated]"
            git push
            echo "Metadata catalog updated and committed"
          else
            echo "No changes to metadata catalog"
          fi
